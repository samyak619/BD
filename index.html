<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Happy Birthday Bhumika</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #0a0a0a;
      font-family: 'Inter', sans-serif;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      touch-action: pan-y;
    }

    canvas#three-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    #ui-layer {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      pointer-events: none;
    }

    #ui-layer > * { pointer-events: auto; }

    #splash {
      position: fixed; inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 10, 0.95);
      cursor: pointer;
    }

    #splash h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 5vw, 3rem);
      color: #ff6b8a;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 1s 0.3s forwards;
    }

    #splash p {
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      color: rgba(255, 255, 255, 0.6);
      opacity: 0;
      animation: fadeUp 1s 0.8s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #music-btn {
      position: fixed;
      bottom: 20px; right: 20px;
      z-index: 50;
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255, 107, 138, 0.4);
      background: rgba(10, 10, 10, 0.7);
      color: #ff6b8a;
      font-size: 18px;
      cursor: pointer;
      display: none;
      backdrop-filter: blur(10px);
    }

    #countdown-ui {
      position: fixed; inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
    }

    #countdown-ui .name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 8vw, 5rem);
      color: #ff6b8a;
      text-shadow: 0 0 40px rgba(255, 107, 138, 0.5),
                   0 0 80px rgba(255, 107, 138, 0.2);
      margin-bottom: 2rem;
    }

    #countdown-ui .timer {
      display: flex;
      gap: clamp(0.5rem, 3vw, 2rem);
    }

    #countdown-ui .timer .unit {
      text-align: center;
    }

    #countdown-ui .timer .unit .value {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 10vw, 6rem);
      color: #fff;
      text-shadow: 0 0 30px rgba(255, 107, 138, 0.4);
    }

    #countdown-ui .timer .unit .label {
      font-size: clamp(0.6rem, 1.5vw, 0.9rem);
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 0.5rem;
    }

    #countdown-ui .subtitle {
      margin-top: 2rem;
      font-size: clamp(0.8rem, 2vw, 1.1rem);
      color: rgba(255, 255, 255, 0.4);
      font-style: italic;
    }

    #reveal-ui {
      position: fixed; inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
    }

    #reveal-ui .hb-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 8vw, 5rem);
      color: #ff6b8a;
      text-shadow: 0 0 60px rgba(255, 107, 138, 0.6);
      opacity: 0;
      transform: scale(0.3) rotateY(90deg);
    }

    #reveal-ui .age {
      font-family: 'Playfair Display', serif;
      font-size: clamp(6rem, 25vw, 15rem);
      color: rgba(255, 107, 138, 0.1);
      position: absolute;
      opacity: 0;
    }

    #story-ui {
      position: fixed; inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
    }

    #story-ui .chapter-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.2rem, 4vw, 2.5rem);
      text-align: center;
      max-width: 80%;
      line-height: 1.6;
      opacity: 0;
      text-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
    }

    #story-ui .scroll-hint {
      position: fixed;
      bottom: 30px;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.4);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    #universe-ui {
      position: fixed; inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
    }

    #universe-ui .planet-label {
      position: absolute;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.7);
      pointer-events: auto;
      cursor: pointer;
      transition: color 0.3s;
    }

    #universe-ui .planet-label:hover { color: #ff6b8a; }

    #gallery-ui {
      position: fixed; inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #gallery-ui .caption-overlay {
      position: fixed;
      bottom: 10%;
      font-family: 'Playfair Display', serif;
      font-size: clamp(1rem, 3vw, 1.8rem);
      color: #ff6b8a;
      text-align: center;
      opacity: 0;
      text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
    }

    #wishes-ui {
      position: fixed; inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #wishes-ui .counter {
      position: fixed;
      top: 20px;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.5);
    }

    #wishes-ui .wish-text {
      position: fixed;
      bottom: 15%;
      font-family: 'Playfair Display', serif;
      font-size: clamp(1rem, 3vw, 1.5rem);
      color: #ff6b8a;
      text-align: center;
      max-width: 80%;
      opacity: 0;
      text-shadow: 0 0 20px rgba(255, 107, 138, 0.3);
    }

    #gallery-skip {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 20px;
      border: 1px solid rgba(255, 107, 138, 0.3);
      background: rgba(10, 10, 10, 0.5);
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.8rem;
      border-radius: 20px;
      cursor: pointer;
      pointer-events: auto;
      display: none;
      transition: color 0.3s, border-color 0.3s;
    }

    #gallery-skip:hover {
      color: #ff6b8a;
      border-color: rgba(255, 107, 138, 0.6);
    }

    #wishes-skip {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 20px;
      border: 1px solid rgba(255, 107, 138, 0.3);
      background: rgba(10, 10, 10, 0.5);
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.8rem;
      border-radius: 20px;
      cursor: pointer;
      pointer-events: auto;
      display: none;
      transition: color 0.3s, border-color 0.3s;
    }

    #wishes-skip:hover {
      color: #ff6b8a;
      border-color: rgba(255, 107, 138, 0.6);
    }

    #letter-ui {
      position: fixed; inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #letter-ui .envelope-prompt {
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      pointer-events: auto;
    }

    #letter-ui .letter-content {
      display: none;
      max-width: min(90%, 600px);
      padding: 2rem;
      font-size: clamp(0.85rem, 2vw, 1.05rem);
      line-height: 1.9;
      color: rgba(255, 255, 255, 0.9);
      text-align: left;
    }

    #letter-ui .letter-content .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #ff6b8a;
      animation: blink 0.7s infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    #finale-ui {
      position: fixed; inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #cake-prompt {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1rem, 3vw, 1.5rem);
      color: rgba(255, 255, 255, 0.7);
      text-align: center;
      pointer-events: none;
      display: none;
      margin-bottom: 1.5rem;
      animation: pulse 2s infinite;
    }

    #cake-container {
      position: relative;
      width: 200px;
      height: 220px;
      cursor: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><line x1="4" y1="28" x2="22" y2="10" stroke="%23ccc" stroke-width="3" stroke-linecap="round"/><polygon points="20,12 30,2 32,4 24,14" fill="%23999"/></svg>') 4 28, pointer;
      display: none;
      pointer-events: auto;
    }

    #cake-container .cake-layer2 {
      position: absolute;
      bottom: 20px; left: 10px;
      width: 180px; height: 70px;
      background: linear-gradient(to bottom, #d4956a, #c17f55);
      border-radius: 8px 8px 12px 12px;
    }

    #cake-container .cake-frosting-mid {
      position: absolute;
      bottom: 88px; left: 8px;
      width: 184px; height: 12px;
      background: #ffb6c1;
      border-radius: 4px;
    }

    #cake-container .cake-layer1 {
      position: absolute;
      bottom: 90px; left: 20px;
      width: 160px; height: 55px;
      background: linear-gradient(to bottom, #e8a87c, #d4956a);
      border-radius: 8px 8px 4px 4px;
    }

    #cake-container .cake-frosting-top {
      position: absolute;
      bottom: 143px; left: 16px;
      width: 168px; height: 10px;
      background: #ff6b8a;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(255, 107, 138, 0.5);
    }

    #cake-container .cake-top {
      position: absolute;
      bottom: 145px; left: 18px;
      width: 164px; height: 14px;
      background: #ffb6c1;
      border-radius: 8px 8px 0 0;
    }

    #cake-container .cake-top::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 14px;
      background: repeating-conic-gradient(#fff 0% 25%, transparent 0% 50%) 0 0 / 16px 14px;
      opacity: 0.4;
      border-radius: 8px 8px 0 0;
    }

    #cake-container .cake-plate {
      position: absolute;
      bottom: 8px; left: -5px;
      width: 210px; height: 24px;
      background: linear-gradient(to bottom, #ddd, #aaa);
      border-radius: 50%;
    }

    #cake-container .cake-text {
      position: absolute;
      bottom: 45px; left: 0; right: 0;
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }

    #cake-container .cake-candle {
      position: absolute;
      bottom: 158px; left: 50%;
      transform: translateX(-50%);
      width: 6px; height: 35px;
      background: linear-gradient(to right, #ff6b8a, #ff4081);
      border-radius: 2px 2px 0 0;
    }
    #cake-container .cake-candle.c2 { left: 30%; }
    #cake-container .cake-candle.c3 { left: 70%; }
    #cake-container .cake-candle.c4 { left: 20%; }
    #cake-container .cake-candle.c5 { left: 80%; }

    #cake-container .flame {
      position: absolute;
      top: -14px; left: 50%;
      transform: translateX(-50%);
      width: 10px; height: 14px;
      background: radial-gradient(ellipse at bottom, #ffd700, #ff8c00 50%, transparent 70%);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      animation: flicker 0.3s infinite alternate;
    }

    @keyframes flicker {
      0% { transform: translateX(-50%) scale(1) rotate(-2deg); opacity: 1; }
      100% { transform: translateX(-50%) scale(1.1) rotate(2deg); opacity: 0.85; }
    }

    #cake-container.cut .cake-candle,
    #cake-container.cut .cake-top,
    #cake-container.cut .cake-frosting-top { display: none; }

    #finale-ui .final-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1rem, 3vw, 1.8rem);
      color: #ff6b8a;
      text-align: center;
      opacity: 0;
      text-shadow: 0 0 30px rgba(255, 107, 138, 0.4);
    }

    #finale-ui .replay-btn {
      margin-top: 2rem;
      padding: 12px 30px;
      border: 1px solid rgba(255, 107, 138, 0.5);
      background: rgba(255, 107, 138, 0.1);
      color: #ff6b8a;
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      border-radius: 30px;
      cursor: pointer;
      pointer-events: auto;
      opacity: 0;
      transition: background 0.3s;
    }

    #finale-ui .replay-btn:hover {
      background: rgba(255, 107, 138, 0.25);
    }

    @media (max-width: 768px) {
      #music-btn { bottom: 15px; right: 15px; width: 40px; height: 40px; font-size: 16px; }
    }
  </style>
</head>
<body>
  <canvas id="three-canvas"></canvas>

  <div id="splash">
    <h1>A Little Something For You...</h1>
    <p>Tap anywhere to begin</p>
  </div>

  <div id="countdown-ui">
    <div class="name">Bhumika</div>
    <div class="timer">
      <div class="unit"><div class="value" id="cd-days">00</div><div class="label">Days</div></div>
      <div class="unit"><div class="value" id="cd-hours">00</div><div class="label">Hours</div></div>
      <div class="unit"><div class="value" id="cd-mins">00</div><div class="label">Minutes</div></div>
      <div class="unit"><div class="value" id="cd-secs">00</div><div class="label">Seconds</div></div>
    </div>
    <div class="subtitle">Something special is on its way...</div>
  </div>

  <div id="reveal-ui">
    <div class="age">24</div>
    <div class="hb-text">Happy Birthday, Bhumika</div>
  </div>

  <div id="story-ui">
    <div class="chapter-text" id="story-text"></div>
    <div class="scroll-hint">Scroll to continue</div>
  </div>

  <div id="universe-ui"></div>

  <div id="gallery-ui">
    <div class="caption-overlay" id="gallery-caption"></div>
    <button id="gallery-skip">Continue to wishes &rarr;</button>
  </div>

  <div id="wishes-ui">
    <div class="counter" id="wishes-counter">0 / 24 wishes</div>
    <div class="wish-text" id="wish-text"></div>
    <button id="wishes-skip">Skip to letter &rarr;</button>
  </div>

  <div id="letter-ui">
    <div class="envelope-prompt">Tap the envelope to open</div>
    <div class="letter-content" id="letter-text"></div>
  </div>

  <div id="finale-ui">
    <div id="cake-prompt">Tap the cake to cut it!</div>
    <div id="cake-container">
      <div class="cake-candle"><div class="flame"></div></div>
      <div class="cake-candle c2"><div class="flame"></div></div>
      <div class="cake-candle c3"><div class="flame"></div></div>
      <div class="cake-candle c4"><div class="flame"></div></div>
      <div class="cake-candle c5"><div class="flame"></div></div>
      <div class="cake-top"></div>
      <div class="cake-frosting-top"></div>
      <div class="cake-layer1"></div>
      <div class="cake-frosting-mid"></div>
      <div class="cake-layer2"></div>
      <div class="cake-plate"></div>
      <div class="cake-text">Happy 24th!</div>
    </div>
    <div class="final-text">From someone who's thinking about you</div>
    <button class="replay-btn">Experience it again</button>
  </div>

  <button id="music-btn">&#9835;</button>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <script src="js/engine.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/sections.js"></script>
  <script src="js/splash.js"></script>
  <script src="js/countdown.js"></script>
  <script src="js/reveal.js"></script>
  <script src="js/story.js"></script>
  <!-- universe removed -->
  <script src="js/gallery.js"></script>
  <script src="js/wishes.js"></script>
  <script src="js/letter.js"></script>
  <script src="js/finale.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => BD.sections.start());
  </script>
</body>
</html>
